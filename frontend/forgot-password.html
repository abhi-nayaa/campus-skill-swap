<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Campus Skill Swap</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="forgot-password">
  <main class="auth-shell">
    <section class="auth-side">
      <div class="auth-brand-block">
        <a class="brand" href="index.html">Campus Skill Swap</a>
        <p class="eyebrow">Recovery</p>
      </div>
      <h1>Get back to your learning community.</h1>
      <p class="auth-text">
        Enter the email address associated with your account, and we'll send you a secure link to reset your password.
      </p>
      <button class="btn auth-back-btn" type="button" data-nav="login.html">Back to Login</button>
    </section>

    <section class="auth-card">
      <div class="auth-card-header">
        <h2>Forgot Password</h2>
        <p class="form-subtitle">We'll help you reset it right away.</p>
      </div>
      <form id="forgotPasswordForm" class="auth-form">
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" name="email" type="email" placeholder="Enter your student email" required>

        <button class="btn auth-submit-btn btn-block" type="submit">Send Reset Link</button>
      </form>

      <p id="forgotMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
