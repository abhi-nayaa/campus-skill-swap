name: CI/CD Pipeline

on:
  push:
  pull_request:

env:
  NODE_VERSION: lts/*
  MONGO_URI: ${{ secrets.MONGO_URI }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  IMAGE_NAME: skillswap-app

jobs:
  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        run: npm run test

  selenium-test:
    name: selenium-test
    runs-on: ubuntu-latest
    needs:
      - frontend-test
      - backend-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Selenium dependencies
        run: npm install

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: false

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run Selenium tests
        run: npm run selenium-test

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs:
      - selenium-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Export Docker image
        run: docker save ${{ env.IMAGE_NAME }} -o /tmp/${{ env.IMAGE_NAME }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/${{ env.IMAGE_NAME }}.tar

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.event_name == 'push'
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/${{ env.IMAGE_NAME }}.tar

      - name: Check Docker Hub credentials
        id: docker-creds
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials are not configured. Skipping publish steps."
          fi

      - name: Login to Docker Hub
        if: steps.docker-creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        if: steps.docker-creds.outputs.available == 'true'
        run: docker tag ${{ env.IMAGE_NAME }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image
        if: steps.docker-creds.outputs.available == 'true'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
