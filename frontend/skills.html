<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills | Campus Skill Swap</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body[data-page="skills"] {
      background: linear-gradient(180deg, #f9efe0 0%, #f3e3cf 100%);
      color: #2f2119;
    }

    .skills-page-wrap {
      padding-top: 96px;
      padding-bottom: 48px;
    }

    .skills-topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 1200;
      background: rgba(255, 248, 238, 0.94);
      border-bottom: 1px solid rgba(101, 64, 42, 0.14);
      backdrop-filter: blur(10px);
    }

    .skills-nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .skills-topbar .campus-brand {
      color: #4a3125;
    }

    .skills-nav-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .skills-header h1 {
      color: #3b271d;
      margin-bottom: 0.35rem;
      font-size: 2rem;
    }

    .skills-header p {
      margin: 0;
      color: #6a5548;
    }

    .skills-panel {
      margin-top: 1.25rem;
      background: rgba(255, 252, 246, 0.95);
      border: 1px solid rgba(101, 64, 42, 0.13);
      box-shadow: 0 14px 26px rgba(53, 30, 16, 0.1);
      border-radius: 20px;
      padding: 1.2rem;
    }

    body[data-page="skills"] .skill-card {
      background: #fffdf8;
      border: 1px solid rgba(101, 64, 42, 0.13);
      color: #2f2119;
      box-shadow: 0 10px 22px rgba(53, 30, 16, 0.08);
    }

    body[data-page="skills"] .skill-card p {
      color: #6a5548;
    }

    body[data-page="skills"] .skill-card h3 {
      color: #35251c;
    }

    @media (max-width: 768px) {
      .skills-page-wrap {
        padding-top: 112px;
      }

      .skills-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body data-page="skills">
  <header class="skills-topbar">
    <div class="container skills-nav">
      <a class="campus-brand" href="index.html">
        <span class="brand-badge brand-badge-svg" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img" focusable="false">
            <defs>
              <linearGradient id="skillsBrandLoop" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd39f"></stop>
                <stop offset="100%" stop-color="#d1853f"></stop>
              </linearGradient>
            </defs>
            <circle cx="18" cy="18" r="6" fill="url(#skillsBrandLoop)"></circle>
            <circle cx="46" cy="46" r="6" fill="url(#skillsBrandLoop)"></circle>
            <circle cx="46" cy="18" r="4" fill="#ffffff"></circle>
            <circle cx="18" cy="46" r="4" fill="#ffffff"></circle>
            <path d="M22 18h16a10 10 0 0 1 0 20H24" fill="none" stroke="url(#skillsBrandLoop)" stroke-width="5" stroke-linecap="round"></path>
            <path d="M42 46H26a10 10 0 0 1 0-20h14" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.92"></path>
          </svg>
        </span>
        <span>Campus Skill Swap</span>
      </a>

      <div class="skills-nav-actions">
        <a class="btn campus-btn-outline-dark" href="index.html">Home</a>
        <a class="btn campus-btn-outline-dark" href="login.html">Login</a>
        <a class="btn campus-btn-primary" href="register.html">Register</a>
      </div>
    </div>
  </header>

  <main class="skills-page-wrap">
    <section class="container">
      <div class="skills-header">
        <h1>Browse Skills</h1>
        <p>Discover campus experts and request a learning session.</p>
      </div>

      <div id="skillsAuthNotice" class="alert alert-warning d-none mt-3 mb-0">
        You are viewing public skills. Login to search, filter, and send session requests.
      </div>

      <div class="skills-panel">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <input type="text" id="searchBrowseSkills" class="form-control" placeholder="Search by skill name...">
          </div>
          <div class="col-md-3">
            <select id="filterCategory" class="form-select">
              <option value="">All Categories</option>
              <option value="Programming">Programming</option>
              <option value="Music">Music</option>
              <option value="Art">Art</option>
              <option value="Language">Language</option>
              <option value="Fitness">Fitness</option>
            </select>
          </div>
          <div class="col-md-3">
            <select id="filterMode" class="form-select">
              <option value="">All Modes</option>
              <option value="Online">Online</option>
              <option value="Offline">Offline</option>
              <option value="Both">Both</option>
            </select>
          </div>
        </div>

        <div class="browse-skill-grid" id="browseSkillsContainer">
          <p>Loading skills...</p>
        </div>

        <div class="pagination-controls mt-4 d-flex justify-content-center gap-2" id="skillsPagination"></div>
      </div>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
</body>
</html>
